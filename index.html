<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEP Ajans Panel</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="brand">
  <img src="./logo.png" style="height:65px;" />
</div>
  <header class="topbar">
    <img class="logo" src="assets/logo.png" alt="MEP Ajans" />
    <div class="quote">Şüphesiz rızık veren, güç ve kuvvet sahibi<br/>olan ancak Allah’tır</div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <button class="nav active" data-page="faturali">Faturalı Siparişler</button>
      <button class="nav" data-page="gelen">Gelen Faturalar</button>
      <button class="nav" data-page="faturasiz">Faturasız Siparişler</button>
      <div class="userbox">MEP+ AJANS</div>
    </aside>

    <main class="content">
      <section class="page active" id="page-faturali"></section>
      <section class="page" id="page-gelen"></section>
      <section class="page" id="page-faturasiz"></section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
