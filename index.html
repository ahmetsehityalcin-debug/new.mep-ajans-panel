<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEP+ AJANS Panel</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="./logo.png" alt="MEP Ajans" class="logo" onerror="this.style.display='none';document.querySelector('.brand-fallback').style.display='block';" />
      <div class="brand-fallback">MEP+ AJANS</div>
    </div>
    <div class="quote">
      <strong>“Şüphesiz rızık veren, güç ve kuvvet sahibi olan ancak Allah’tır.”</strong>
      <span>Zâriyât Suresi - 58. Ayet</span>
    </div>
  </header>
  <main class="layout">
    <aside class="sidebar">
      <button class="nav active" data-page="faturali">Faturalı Siparişler</button>
      <button class="nav" data-page="gelen">Gelen Faturalar</button>
      <button class="nav" data-page="faturasiz">Faturasız Siparişler</button>
      <div class="sidebar-footer">MEP+ AJANS</div>
    </aside>
    <section class="content">
      <div id="page-faturali" class="page active"></div>
      <div id="page-gelen" class="page"></div>
      <div id="page-faturasiz" class="page"></div>
    </section>
  </main>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
